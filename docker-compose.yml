services:
  postgres:
    image: postgres:16
    container_name: logguard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - logguard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: logguard_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - logguard_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: logguard_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "python scripts/migrate_all.py && python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8001"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: logguard_worker
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m celery -A backend.app.celery_app worker --loglevel=info

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8001
        NEXT_PUBLIC_API_MODE: direct
    container_name: logguard_frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  logguard_postgres_data:
  logguard_redis_data:
